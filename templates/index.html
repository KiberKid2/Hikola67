<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>AI Киносоветчик</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
      </head>
<body>
<h1>AI Киносоветчик</h1>
<p>Введите фразу о своем настроении. Искусственный интеллект подберет фильм.</p>

    <form method="post">
        <textarea name="message" rows="4" cols="50"
                  placeholder="Например: Сегодня отличный день!"
                  required>{{ user_text }}</textarea><br>
        <button type="submit">Получить рекомендацию</button>
    </form>

    {% if recommendation %}
    <div class="result">
        <h3>Результат</h3>
        <p>{{ recommendation }}</p>
    </div>
    {% endif %}
</body>
</html>
